<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scores des Paris — Mario Kart Tournoi</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8001D; --blue: #0052A5; --yellow: #FFD700; --dark: #07071a;
      --red-glow: rgba(232,0,29,0.5); --blue-glow: rgba(0,82,165,0.5); --yellow-glow: rgba(255,215,0,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); font-family:'Exo 2',sans-serif; color:#fff; min-height:100vh; }
    .bg {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 10%,rgba(232,0,29,0.10),transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,215,0,0.08),transparent 60%),
        linear-gradient(180deg,#060610 0%,#0A0A1E 100%);
    }
    .top-bar {
      position:sticky; top:0; z-index:100;
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
      padding:0 28px; min-height:64px;
      background:rgba(7,7,26,0.92); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(232,0,29,0.30); box-shadow:0 4px 32px rgba(0,0,0,0.5); gap:16px;
    }
    .brand-wrap { justify-self:start; }
    .title-wrap  { justify-self:center; }
    .back-wrap   { justify-self:end; }
    .brand { font-family:'Russo One',sans-serif; font-size:0.9rem; letter-spacing:0.1em; color:var(--yellow); text-decoration:none; text-shadow:0 0 12px rgba(255,215,0,0.6); white-space:nowrap; }
    .brand span { color:rgba(255,255,255,0.5); }
    .top-title { text-align:center; font-family:'Russo One',sans-serif; font-size:1.3rem; letter-spacing:0.15em; text-transform:uppercase; white-space:nowrap; }
    .back-btn { font-size:0.8rem; color:rgba(255,255,255,0.4); text-decoration:none; letter-spacing:0.1em; transition:color 0.2s; white-space:nowrap; }
    .back-btn:hover { color:var(--red); }
    .page { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:48px 20px 80px; }
    h1 { font-family:'Russo One',sans-serif; font-size:2rem; text-align:center; color:var(--yellow); text-shadow:0 0 20px rgba(255,215,0,0.5); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }
    .subtitle { text-align:center; color:rgba(255,255,255,0.4); letter-spacing:0.15em; font-size:0.85rem; text-transform:uppercase; margin-bottom:36px; }
    .refresh-bar { display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-bottom:28px; }
    .last-update { font-size:0.75rem; color:rgba(255,255,255,0.28); letter-spacing:0.06em; }
    .refresh-btn { padding:7px 18px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:6px; color:rgba(255,255,255,0.5); font-family:'Russo One',sans-serif; font-size:0.72rem; letter-spacing:0.08em; cursor:pointer; transition:all 0.2s; }
    .refresh-btn:hover { background:rgba(255,255,255,0.09); color:#fff; }
    .section-head { font-family:'Russo One',sans-serif; font-size:1.15rem; letter-spacing:0.1em; text-transform:uppercase; display:flex; align-items:center; gap:10px; margin-bottom:16px; margin-top:48px; }
    .section-head:first-of-type { margin-top:0; }
    .sh-line { flex:1; height:1px; background:rgba(255,255,255,0.08); }
    .podium-row { display:flex; justify-content:center; align-items:flex-end; gap:12px; margin-bottom:32px; }
    .podium-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:12px; text-align:center; padding:20px 14px 16px; transition:transform 0.2s; min-width:130px; }
    .podium-card:hover { transform:translateY(-4px); }
    .p1 { border-color:var(--yellow); box-shadow:0 0 24px rgba(255,215,0,0.25); min-width:160px; padding-top:28px; }
    .p2 { border-color:#C0C0C0; box-shadow:0 0 14px rgba(192,192,192,0.18); }
    .p3 { border-color:#CD7F32; box-shadow:0 0 14px rgba(205,127,50,0.18); }
    .podium-rank { font-size:2rem; margin-bottom:6px; display:block; }
    .podium-name { font-family:'Russo One',sans-serif; font-size:0.95rem; letter-spacing:0.05em; margin-bottom:8px; }
    .p1 .podium-name { color:var(--yellow); font-size:1.1rem; }
    .p2 .podium-name { color:#C0C0C0; }
    .p3 .podium-name { color:#CD7F32; }
    .podium-pts { font-family:'Russo One',sans-serif; font-size:1.6rem; }
    .p1 .podium-pts { font-size:2rem; color:var(--yellow); }
    .p2 .podium-pts { color:#C0C0C0; }
    .p3 .podium-pts { color:#CD7F32; }
    .pts-label { font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:0.1em; }
    .lb-table { width:100%; border-collapse:collapse; margin-bottom:8px; }
    .lb-table th { font-family:'Russo One',sans-serif; font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); padding:9px 14px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.08); }
    .lb-table th.right { text-align:right; }
    .lb-table td { padding:11px 14px; font-size:0.88rem; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; }
    .lb-table tr:last-child td { border-bottom:none; }
    .lb-table tr:hover td { background:rgba(255,255,255,0.03); }
    .lb-rank-num { font-family:'Russo One',sans-serif; font-size:1rem; color:rgba(255,255,255,0.3); width:36px; }
    .lb-name { font-weight:700; color:rgba(255,255,255,0.9); }
    .lb-pts { text-align:right; font-family:'Russo One',sans-serif; font-size:1.05rem; color:#8ec1ff; }
    .lb-breakdown { text-align:right; font-size:0.75rem; color:rgba(255,255,255,0.28); letter-spacing:0.03em; }
    .lb-phase-badges { display:flex; gap:5px; flex-wrap:wrap; }
    .phase-badge { font-size:0.64rem; padding:2px 7px; border-radius:20px; font-family:'Russo One',sans-serif; letter-spacing:0.05em; border:1px solid; }
    .pb-p0 { background:transparent; border-color:transparent; color:rgba(255,255,255,0.28); font-family:'Exo 2',sans-serif; font-weight:400; letter-spacing:0.03em; }
    .pb-p1 { background:rgba(232,0,29,0.08); border-color:rgba(232,0,29,0.3); color:#ff8090; }
    .pb-p2 { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.3); color:var(--yellow); }
    .lb-empty { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.25); font-style:italic; font-size:0.9rem; }
    .cotes-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:4px; }
    @media(max-width:720px) { .cotes-grid { grid-template-columns:1fr; } }
    .cotes-panel { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:12px; overflow:hidden; }
    .cotes-panel-head { padding:12px 16px; font-family:'Russo One',sans-serif; font-size:0.82rem; letter-spacing:0.09em; display:flex; align-items:center; gap:8px; }
    .cp-blue   { background:rgba(0,82,165,0.25);   color:#6eb4ff;      border-bottom:1px solid rgba(0,82,165,0.3); }
    .cp-red    { background:rgba(232,0,29,0.20);   color:#ff8090;      border-bottom:1px solid rgba(232,0,29,0.3); }
    .cp-yellow { background:rgba(255,215,0,0.14);  color:var(--yellow); border-bottom:1px solid rgba(255,215,0,0.3); }
    .cotes-list { padding:12px 0; }
    .cotes-row { display:flex; align-items:center; justify-content:space-between; padding:7px 16px; transition:background 0.15s; }
    .cotes-row:hover { background:rgba(255,255,255,0.03); }
    .cotes-player { font-size:0.85rem; font-weight:600; color:rgba(255,255,255,0.82); flex:1; }
    .cotes-bar-wrap { flex:1; margin:0 10px; }
    .cotes-bar-bg { height:6px; background:rgba(255,255,255,0.07); border-radius:3px; overflow:hidden; }
    .cotes-bar-fill { height:100%; border-radius:3px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
    .fill-blue   { background:linear-gradient(90deg,#0052A5,#6eb4ff); }
    .fill-red    { background:linear-gradient(90deg,#E8001D,#ff8090); }
    .fill-yellow { background:linear-gradient(90deg,#b8860b,#FFD700); }
    .cotes-count { font-family:'Russo One',sans-serif; font-size:0.75rem; color:rgba(255,255,255,0.4); min-width:28px; text-align:right; }
    .cotes-crown { font-size:0.9rem; margin-right:4px; }
    .cotes-empty { padding:16px; font-size:0.8rem; color:rgba(255,255,255,0.22); font-style:italic; text-align:center; }
    .stats-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px; }
    .stat-chip { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px 16px; display:flex; flex-direction:column; gap:2px; }
    .stat-val { font-family:'Russo One',sans-serif; font-size:1.3rem; color:#fff; }
    .stat-lbl { font-size:0.72rem; color:rgba(255,255,255,0.35); letter-spacing:0.08em; text-transform:uppercase; }
    @media(max-width:760px) {
      .top-bar { grid-template-columns:1fr; padding:14px 18px; }
      .brand-wrap,.title-wrap,.back-wrap { justify-self:center; }
      .top-title { white-space:normal; font-size:1rem; }
      .podium-row { flex-wrap:wrap; align-items:center; }
      .podium-card { min-width:100px; }
    }
  </style>
</head>
<body>
<div class="bg"></div>

<div class="top-bar">
  <div class="brand-wrap">
    <a href="index.html" class="brand">🏆 <span>TOURNOI INTERNE</span> MARIO KART</a>
  </div>
  <div class="title-wrap">
    <div class="top-title">SCORES DES PARIS</div>
  </div>
  <div class="back-wrap">
    <a href="index.html" class="back-btn">← Accueil</a>
  </div>
</div>

<div class="page">
  <h1>🏆 CLASSEMENT DES PARIEURS</h1>
  <p class="subtitle" id="subtitle-line">Chargement des données…</p>

  <div class="refresh-bar">
    <span class="last-update" id="last-update-label"></span>
    <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
  </div>

  <div class="stats-row" id="stats-row" style="display:none"></div>
  <div id="podium-wrap"></div>

  <div class="section-head" style="color:rgba(255,255,255,0.7);">
    🎯 Classement complet
    <div class="sh-line"></div>
  </div>
  <table class="lb-table" id="lb-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Parieur</th>
        <th>Phases</th>
        <th class="right">Détail</th>
        <th class="right">Total pts</th>
      </tr>
    </thead>
    <tbody id="lb-body"></tbody>
  </table>

  <div class="section-head" style="color:rgba(255,255,255,0.7); margin-top:56px;">
    📊 Côtes — Pronostics de vainqueurs
    <div class="sh-line"></div>
  </div>
  <p style="font-size:0.8rem;color:rgba(255,255,255,0.3);margin-bottom:18px;">
    Nombre de parieurs ayant désigné chaque joueur comme vainqueur de tableau.
  </p>
  <div class="cotes-grid" id="cotes-grid"></div>
</div>

<script>
function loadData() {
  const raw = localStorage.getItem('mk_tournament_data');
  if (!raw) { showEmpty(); return; }
  try {
    const data = JSON.parse(raw);
    renderAll(data);
    const ts = data.lastUpdate ? new Date(data.lastUpdate).toLocaleString('fr-FR') : '—';
    document.getElementById('last-update-label').textContent = 'Mis à jour le ' + ts;
  } catch(e) { showEmpty(); }
}

function showEmpty() {
  document.getElementById('subtitle-line').textContent = 'Aucun paris saisi pour le moment.';
  document.getElementById('last-update-label').textContent = '';
  document.getElementById('podium-wrap').innerHTML = '';
  document.getElementById('lb-body').innerHTML = `<tr><td colspan="5" class="lb-empty">Aucun parieur enregistré pour le moment.</td></tr>`;
  document.getElementById('stats-row').style.display = 'none';
  renderCotes({ t1:[], t2:[], t3:[] });
}

function renderAll(data) {
  const bettors = data.bettors || [];
  const results = data.results || {};
  const scored = bettors.map(b => ({ ...b, score: computeScore(b, results) }));
  scored.sort((a, b) => b.score.total - a.score.total || a.name.localeCompare(b.name, 'fr'));
  document.getElementById('subtitle-line').textContent =
    `${scored.length} parieur${scored.length > 1 ? 's' : ''} · Matchs joués : ${countPlayedMatches(results)}`;
  renderStats(scored, results);
  renderPodium(scored);
  renderTable(scored);
  renderCotes(buildCotes(bettors));
}

function countPlayedMatches(results) {
  return Object.keys(results).filter(k => results[k] && results[k].played).length;
}

function renderStats(scored, results) {
  const wrap = document.getElementById('stats-row');
  const played = countPlayedMatches(results);
  const maxPts = scored.length > 0 ? scored[0].score.total : 0;
  wrap.style.display = 'flex';
  wrap.innerHTML = `
    <div class="stat-chip"><span class="stat-val">${scored.length}</span><span class="stat-lbl">Parieurs</span></div>
    <div class="stat-chip"><span class="stat-val">${played}</span><span class="stat-lbl">Matchs joués</span></div>
    <div class="stat-chip"><span class="stat-val">${maxPts}</span><span class="stat-lbl">Score max</span></div>`;
}

/* ════════════════════════════════════════════════════════════
   VAINQUEUR RÉEL = joueur classé 1er du match 1 du tour 3
════════════════════════════════════════════════════════════ */
function getActualWinner(tabNumber, results) {
  const key = `t${tabNumber}_tour3_m0`;
  const res = results[key];
  if (!res || !res.played || !res.ranks) return null;
  return Object.entries(res.ranks).find(([, rank]) => String(rank) === '1')?.[0] || null;
}

/* ════════════════════════════════════════════════════════════
   CALCUL DU SCORE
   +1 pt par joueur bien classé dans un match
   +20 pts si pari vainqueur (phase 0) = 1er du match 1 tour 3
════════════════════════════════════════════════════════════ */
function computeScore(bettor, results) {
  let matchPts = 0;
  let winnerPts = 0;

  const bets = bettor.bets || {};
  for (const matchKey of Object.keys(bets)) {
    const res = results[matchKey];
    if (!res || !res.played) continue;
    const bet = bets[matchKey];
    for (const [player, predictedRank] of Object.entries(bet)) {
      if (res.ranks && res.ranks[player] && String(res.ranks[player]) === String(predictedRank)) {
        matchPts++;
      }
    }
  }

  [1, 2, 3].forEach(tabNum => {
    const actual = getActualWinner(tabNum, results);
    if (!actual) return;
    const p0 = (bettor.winnerBets_p0 || {})[`t${tabNum}`];
    if (p0 && p0 === actual) winnerPts += 20;
  });

  return { total: matchPts + winnerPts, matchPts, winnerPts, phases: bettor.phases || [] };
}

/* ════════════════════════════════════════════════════════════
   PODIUM
════════════════════════════════════════════════════════════ */
function renderPodium(scored) {
  const wrap = document.getElementById('podium-wrap');
  if (scored.length === 0) { wrap.innerHTML = ''; return; }
  const medals = ['🥇','🥈','🥉'];
  const cls    = ['p1','p2','p3'];
  const order  = [1, 0, 2];
  let html = '<div class="podium-row">';
  order.forEach(i => {
    const b = scored[i];
    if (!b) return;
    html += `
      <div class="podium-card ${cls[i]}">
        <span class="podium-rank">${medals[i]}</span>
        <div class="podium-name">${esc(b.name)}</div>
        <div class="podium-pts">${b.score.total}</div>
        <div class="pts-label">POINTS</div>
      </div>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════
   TABLEAU CLASSEMENT
════════════════════════════════════════════════════════════ */
function renderTable(scored) {
  const tbody = document.getElementById('lb-body');
  if (scored.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="lb-empty">Aucun parieur enregistré pour le moment.</td></tr>`;
    return;
  }
  // Calcul des rangs avec ex-aequo
  let rank = 1;
  const ranks = scored.map((b, i) => {
    if (i === 0) { rank = 1; return 1; }
    if (b.score.total === scored[i - 1].score.total) return null; // ex-aequo : tiret
    rank = i + 1;
    return rank;
  });
  tbody.innerHTML = scored.map((b, i) => {
    const phaseBadges = (b.score.phases || []).map(p => {
      const labels = { p0:'avant', p1:'T1', p2:'T2' };
      return `<span class="phase-badge pb-${p}">${labels[p] || p}</span>`;
    }).join('');
    const rankDisplay = ranks[i] !== null
      ? ranks[i]
      : '<span style="color:rgba(255,255,255,0.18);font-size:0.85rem">—</span>';
    return `<tr>
      <td class="lb-rank-num">${rankDisplay}</td>
      <td class="lb-name">${esc(b.name)}</td>
      <td><div class="lb-phase-badges">${phaseBadges || '<span style="color:rgba(255,255,255,0.2);font-size:0.75rem">—</span>'}</div></td>
      <td class="lb-breakdown">${b.score.matchPts} ${b.score.matchPts <= 1 ? 'pt' : 'pts'} matchs · ${b.score.winnerPts} ${b.score.winnerPts <= 1 ? 'pt' : 'pts'} vainqueurs</td>
      <td class="lb-pts">${b.score.total} <span style="font-size:0.65rem;opacity:0.5">${b.score.total <= 1 ? 'pt' : 'pts'}</span></td>
    </tr>`;
  }).join('');
}

/* ════════════════════════════════════════════════════════════
   CÔTES
════════════════════════════════════════════════════════════ */
function buildCotes(bettors) {
  const cotes = { t1:{}, t2:{}, t3:{} };
  bettors.forEach(b => {
    ['p0','p1','p2'].forEach(phase => {
      const wb = b[`winnerBets_${phase}`] || {};
      ['t1','t2','t3'].forEach(tab => {
        const pick = wb[tab];
        if (pick) cotes[tab][pick] = (cotes[tab][pick] || 0) + 1;
      });
    });
  });
  const toArr = obj => Object.entries(obj)
    .sort((a,b) => b[1]-a[1])
    .map(([name,count]) => ({ name, count }));
  return { t1: toArr(cotes.t1), t2: toArr(cotes.t2), t3: toArr(cotes.t3) };
}

function renderCotes(cotes) {
  const wrap = document.getElementById('cotes-grid');
  const tabs = [
    { key:'t1', label:'Tableau 1 · 1er général',  cls:'cp-blue',   fill:'fill-blue' },
    { key:'t2', label:'Tableau 2 · 17e général',  cls:'cp-red',    fill:'fill-red' },
    { key:'t3', label:'Tableau 3 · 33e général',  cls:'cp-yellow', fill:'fill-yellow' },
  ];
  wrap.innerHTML = tabs.map(tab => {
    const list = cotes[tab.key] || [];
    const maxCount = list.length > 0 ? list[0].count : 1;
    const totalVotes = list.reduce((s,x) => s + x.count, 0);
    const rows = list.length === 0
      ? `<div class="cotes-empty">Aucun pronostic enregistré</div>`
      : list.map((item, i) => `
          <div class="cotes-row">
            <span class="cotes-player">
              ${i === 0 ? '<span class="cotes-crown">👑</span>' : ''}${esc(item.name)}
            </span>
            <div class="cotes-bar-wrap">
              <div class="cotes-bar-bg">
                <div class="cotes-bar-fill ${tab.fill}" style="width:${Math.round(item.count/maxCount*100)}%"></div>
              </div>
            </div>
            <span class="cotes-count">${item.count}×</span>
          </div>`).join('');
    return `
      <div class="cotes-panel">
        <div class="cotes-panel-head ${tab.cls}">🏆 ${tab.label}</div>
        <div class="cotes-list">${rows}</div>
        ${totalVotes > 0 ? `<div style="padding:6px 16px 12px;font-size:0.72rem;color:rgba(255,255,255,0.22);text-align:right;">${totalVotes} vote${totalVotes>1?'s':''} total</div>` : ''}
      </div>`;
  }).join('');
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

loadData();
</script>
</body>
</html>
