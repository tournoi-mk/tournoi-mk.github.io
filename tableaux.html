<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableaux de Résultats — Mario Kart</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8001D;
      --blue: #0052A5;
      --yellow: #FFD700;
      --white: #FFFFFF;
      --dark: #07071a;

      --blue-soft: rgba(0,82,165,0.18);
      --red-soft: rgba(232,0,29,0.18);
      --yellow-soft: rgba(255,215,0,0.14);

      --blue-border: rgba(0,82,165,0.42);
      --red-border: rgba(232,0,29,0.42);
      --yellow-border: rgba(255,215,0,0.38);

      --blue-glow: rgba(0,82,165,0.45);
      --red-glow: rgba(232,0,29,0.45);
      --yellow-glow: rgba(255,215,0,0.35);

      --col-width: 316px;
      --connector-width: 40px;
      --layout-width: calc(var(--col-width) * 3 + var(--connector-width) * 2);
      --card-height: 226px;
      --label-height: 56px;
      --gap-cards: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      font-family: 'Exo 2', sans-serif;
      color: var(--white);
      min-height: 100vh;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,82,165,0.2), transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(232,0,29,0.12), transparent 60%),
        linear-gradient(180deg, #060610 0%, #0A0A1E 100%);
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent 0, transparent 79px, rgba(255,255,255,0.018) 79px, rgba(255,255,255,0.018) 80px),
        repeating-linear-gradient(180deg, transparent 0, transparent 79px, rgba(255,255,255,0.018) 79px, rgba(255,255,255,0.018) 80px);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 28px;
      height: 64px;
      background: rgba(7,7,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232,0,29,0.3);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    .brand {
      font-family: 'Russo One', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--yellow);
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
      text-decoration: none;
      white-space: nowrap;
    }

    .brand span {
      color: rgba(255,255,255,0.5);
    }

    .top-title {
      flex: 1;
      text-align: center;
      font-family: 'Russo One', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      color: var(--white);
      text-transform: uppercase;
    }

    .back-btn {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.1em;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--red);
    }

    .page {
      position: relative;
      z-index: 1;
      padding: 40px 20px 80px;
    }

    .bracket-section {
      width: var(--layout-width);
      max-width: var(--layout-width);
      margin: 0 auto 72px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 30px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }

    .section-number {
      font-family: 'Russo One', sans-serif;
      font-size: 3rem;
      line-height: 1;
    }

    .section-number.t1 {
      color: var(--blue);
      text-shadow: 0 0 20px var(--blue-glow);
    }

    .section-number.t2 {
      color: var(--red);
      text-shadow: 0 0 20px var(--red-glow);
    }

    .section-number.t3 {
      color: var(--yellow);
      text-shadow: 0 0 20px var(--yellow-glow);
    }

    .section-info h2 {
      font-family: 'Russo One', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.06em;
    }

    .section-info p {
      font-size: 0.86rem;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .section-badge {
      margin-left: auto;
      min-width: 152px;
      text-align: center;
      padding: 10px 18px;
      border-radius: 999px;
      font-family: 'Russo One', sans-serif;
      font-size: 0.86rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: 0 0 18px rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    .badge-blue {
      background: rgba(0,82,165,0.26);
      border: 1px solid var(--blue);
      color: #7bc0ff;
    }

    .badge-red {
      background: rgba(232,0,29,0.26);
      border: 1px solid var(--red);
      color: #ff95a2;
    }

    .badge-gold {
      background: rgba(255,215,0,0.18);
      border: 1px solid var(--yellow);
      color: #ffe26a;
    }

    .legend {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      width: 100%;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.52);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .bracket-layout {
      display: grid;
      grid-template-columns: var(--col-width) var(--connector-width) var(--col-width) var(--connector-width) var(--col-width);
      gap: 0;
      align-items: start;
      width: 100%;
    }

    .tour-col {
      width: var(--col-width);
      min-width: var(--col-width);
    }

    .tour-col-inner {
      display: grid;
      grid-template-rows: var(--label-height) repeat(4, var(--card-height));
      gap: var(--gap-cards);
    }

    .tour-label {
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--label-height);
      font-family: 'Russo One', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 14px;
      border-radius: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      line-height: 1.15;
    }

    .lbl-t1-blue,
    .lbl-t2-blue,
    .lbl-t3-blue {
      background: linear-gradient(180deg, rgba(0,82,165,0.42), rgba(0,82,165,0.24));
      color: #7bc0ff;
      border: 1px solid rgba(0,82,165,0.55);
    }

    .lbl-t1-red,
    .lbl-t2-red,
    .lbl-t3-red {
      background: linear-gradient(180deg, rgba(232,0,29,0.42), rgba(232,0,29,0.22));
      color: #ff97a3;
      border: 1px solid rgba(232,0,29,0.55);
    }

    .lbl-t1-yellow,
    .lbl-t2-yellow,
    .lbl-t3-yellow {
      background: linear-gradient(180deg, rgba(255,215,0,0.26), rgba(255,215,0,0.14));
      color: #ffe164;
      border: 1px solid rgba(255,215,0,0.44);
    }

    .connector-col {
      width: var(--connector-width);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding-top: calc(var(--label-height) + 2px);
    }

    .group-card,
    .match-card {
      height: var(--card-height);
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, transform 0.2s;
    }

    .group-card:hover,
    .match-card:hover {
      transform: translateY(-1px);
    }

    .tour1-card-blue,
    .tour2-card-blue,
    .tour3-card-blue {
      background: linear-gradient(180deg, rgba(7,15,40,0.96), rgba(14,14,35,0.9));
      border: 1px solid var(--blue-border);
      box-shadow: 0 0 18px rgba(0,82,165,0.08);
    }

    .tour1-card-red,
    .tour2-card-red,
    .tour3-card-red {
      background: linear-gradient(180deg, rgba(32,8,16,0.96), rgba(14,14,35,0.9));
      border: 1px solid var(--red-border);
      box-shadow: 0 0 18px rgba(232,0,29,0.08);
    }

    .tour1-card-yellow,
    .tour2-card-yellow,
    .tour3-card-yellow {
      background: linear-gradient(180deg, rgba(35,28,4,0.92), rgba(14,14,35,0.9));
      border: 1px solid var(--yellow-border);
      box-shadow: 0 0 18px rgba(255,215,0,0.08);
    }

    .group-header,
    .match-header {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 40px;
      padding: 10px 14px;
    }

    .gh-blue,
    .mh-blue {
      background: linear-gradient(180deg, rgba(0,82,165,0.34), rgba(0,82,165,0.22));
      border-bottom: 1px solid rgba(0,82,165,0.32);
    }

    .gh-red,
    .mh-red {
      background: linear-gradient(180deg, rgba(232,0,29,0.30), rgba(232,0,29,0.18));
      border-bottom: 1px solid rgba(232,0,29,0.32);
    }

    .gh-yellow,
    .mh-yellow {
      background: linear-gradient(180deg, rgba(255,215,0,0.20), rgba(255,215,0,0.12));
      border-bottom: 1px solid rgba(255,215,0,0.28);
    }

    .group-name,
    .match-label {
      font-family: 'Russo One', sans-serif;
      letter-spacing: 0.1em;
    }

    .group-name {
      font-size: 0.96rem;
    }

    .match-label {
      font-size: 0.86rem;
    }

    .match-desc {
      margin-left: auto;
      text-align: right;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.04em;
      line-height: 1.15;
    }

    .tour2-desc {
      font-size: 0.64rem;
    }

    .tour3-desc {
      font-size: 0.86rem;
      font-weight: 800;
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .player-row,
    .match-slot {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: calc((var(--card-height) - 40px) / 4);
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .player-row:last-child,
    .match-slot:last-child {
      border-bottom: none;
    }

    .player-row:hover,
    .match-slot:hover {
      background: rgba(255,255,255,0.045);
    }

    .player-rank {
      width: 14px;
      text-align: center;
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(255,255,255,0.28);
    }

    .player-kart,
    .slot-kart {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-size: 0.98rem;
    }

    .player-name,
    .slot-name {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.01em;
    }

    .player-score {
      min-width: 24px;
      text-align: right;
      font-family: 'Russo One', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.22);
    }

    .slot-origin {
      width: 92px;
      flex-shrink: 0;
      font-size: 0.66rem;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.03em;
      line-height: 1.15;
    }

    .section-sep {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      margin: 0 0 72px;
      width: var(--layout-width);
      max-width: var(--layout-width);
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 72px;
    }

    @media (max-width: 1100px) {
      .bracket-section,
      .section-sep {
        width: 100%;
        max-width: 100%;
      }

      .bracket-layout {
        overflow-x: auto;
      }
    }

    @media (max-width: 768px) {
      .bracket-layout {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .tour-col {
        min-width: 100%;
        width: 100%;
      }

      .tour-col-inner {
        grid-template-rows: auto;
      }

      .group-card,
      .match-card {
        height: auto;
      }

      .connector-col {
        display: none;
      }

      .section-header {
        flex-wrap: wrap;
      }

      .section-badge {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="top-bar">
  <a href="index.html" class="brand">🏆 <span>TOURNOI INTERNE</span> MARIO KART</a>
  <div class="top-title">Tableaux de résultats</div>
  <a href="index.html" class="back-btn">← Accueil</a>
</div>

<div class="page">
  <div id="brackets-container"></div>
</div>

<script>
  const brackets = [
    {

      names: {

        ],

        ],

        ]
      }
    },
    {
      id: 2,
      label: "Tableau 2",

      badgeClass: "badge-red",
      groups: ["E", "F", "G", "H"],

      tour1LabelClass: "lbl-t1-red",
      tour2LabelClass: "lbl-t2-yellow",
      tour3LabelClass: "lbl-t3-blue",

      groupHeaderClass: "gh-red",
      tour2HeaderClass: "mh-yellow",
      tour3HeaderClass: "mh-blue",

      tour1CardClass: "tour1-card-red",
      tour2CardClass: "tour2-card-yellow",
      tour3CardClass: "tour3-card-blue",

      legendTour1Color: "#E8001D",
      legendTour2Color: "#FFD700",
      legendTour3Color: "#0052A5",

      connector1Color: "#E8001D",
      connector2Color: "#0052A5",

      names: {
        tour1: [
          ["Axel", "Pauline", "Nathan", "Sarah"],
          ["Tom", "Lucie", "Simon", "Alice"],
          ["Enzo", "Charlotte", "Ethan", "Clara"],
          ["Romain", "Anaïs", "Clément", "Eva"]
        ],
        tour2: [
          ["", "", "", ""],

        ],
        tour3: [

          ["", "", "", ""],
          ["", "", "", ""],
          ["", "", "", ""]
        ]
      }
    },
    {
      id: 3,
      label: "Tableau 3",
      places: "Places 33 à 48",
      colorClass: "t3",
      badgeClass: "badge-gold",
      groups: ["I", "J", "K", "L"],

      tour1LabelClass: "lbl-t1-yellow",
      tour2LabelClass: "lbl-t2-blue",
      tour3LabelClass: "lbl-t3-red",

      groupHeaderClass: "gh-yellow",

      tour3HeaderClass: "mh-red",

      tour1CardClass: "tour1-card-yellow",
      tour2CardClass: "tour2-card-blue",
      tour3CardClass: "tour3-card-red",

      legendTour1Color: "#FFD700",
      legendTour2Color: "#0052A5",
      legendTour3Color: "#E8001D",

      connector1Color: "#FFD700",
      connector2Color: "#E8001D",

      names: {

          ["Julien", "Marine", "Kevin", "Élisa"],
          ["Matteo", "Amandine", "Alexis", "Lola"],
          ["Victor", "Margot", "Pierre", "Céline"],

        ],

        ],
        tour3: [
          ["", "", "", ""],

          ["", "", "", ""],
          ["", "", "", ""]
        ]
      }
    }
  ];

  function tour2Config(groups, names) {
    const [A, B, C, D] = groups;

    return [
      {
        label: "Match 1",
        desc: `1ers ${A}+${C} · 2es ${B}+${D}`,
        slots: [
          { origin: `1er Poule ${A}`, name: names[0][0] },
          { origin: `2e Poule ${B}`,  name: names[0][1] },
          { origin: `1er Poule ${C}`, name: names[0][2] },
          { origin: `2e Poule ${D}`,  name: names[0][3] }
        ]
      },
      {
        label: "Match 2",
        desc: `2es ${A}+${C} · 1ers ${B}+${D}`,
        slots: [
          { origin: `2e Poule ${A}`,  name: names[1][0] },
          { origin: `1er Poule ${B}`, name: names[1][1] },

      {

          { origin: `3e Poule ${B}`,  name: names[3][1] },
          { origin: `4e Poule ${C}`,  name: names[3][2] },
          { origin: `3e Poule ${D}`,  name: names[3][3] }

      }

  }

  function tour3Config(offset, names) {
    const o = offset;

    return [
      {
        label: "Match 1",
        places: `Places ${o + 1}–${o + 4}`,
        slots: [
          { origin: "1er Match 1 T2", name: names[0][0] },
          { origin: "2e Match 1 T2",  name: names[0][1] },
          { origin: "1er Match 2 T2", name: names[0][2] },

      {

        places: `Places ${o + 5}–${o + 8}`,
        slots: [
          { origin: "3e Match 1 T2", name: names[1][0] },
          { origin: "4e Match 1 T2", name: names[1][1] },

      },
      {
        label: "Match 4",
        places: `Places ${o + 13}–${o + 16}`,
        slots: [
          { origin: "3e Match 3 T2", name: names[3][0] },
          { origin: "4e Match 3 T2", name: names[3][1] },
          { origin: "3e Match 4 T2", name: names[3][2] },
          { origin: "4e Match 4 T2", name: names[3][3] }
        ]
      }
    ];
  }

  const tour1Icons = ["🚀", "⚡", "🍄", "🌈", "🎲", "🧨", "🏕️", "🍄", "🌈", "🎮", "🛸", "⚡", "🎮", "🍄", "⚡", "🪝"];
  const tour2Icons = ["🎮", "🪝", "🎲", "🍄", "🎲", "⚡", "💥", "🌞", "🌀", "⚡", "🎮", "🚀", "🏎️", "🌞", "🍄", "⚡"];
  const tour3Icons = ["🎸", "🐉", "🌊", "🧙", "🦋", "🦅", "🌙", "🎃", "🦄", "🐸", "🎃", "🦊", "🎃", "🌊", "🦋", "🦁"];

  function getIcon(list, index) {
    return list[index % list.length];
  }

  const container = document.getElementById("brackets-container");

  brackets.forEach((b, bi) => {
    const placeOffset = bi * 16;
    const tour2 = tour2Config(b.groups, b.names.tour2);
    const tour3 = tour3Config(placeOffset, b.names.tour3);

    const section = document.createElement("section");
    section.className = "bracket-section";

    section.innerHTML = `
      <div class="section-header">
        <div class="section-number ${b.colorClass}">${b.id}</div>
        <div class="section-info">
          <h2>${b.label}</h2>
          <p>${b.places}</p>
        </div>
        <div class="section-badge ${b.badgeClass}">${b.places.toUpperCase()}</div>
      </div>

      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:${b.legendTour1Color}"></div>
          Tour 1 — Poules (4 × 4 joueurs)
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:${b.legendTour2Color}"></div>
          Tour 2 — Qualifications croisées
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:${b.legendTour3Color}"></div>
          Tour 3 — Classement final
        </div>
      </div>
    `;

    const layout = document.createElement("div");
    layout.className = "bracket-layout";

    const col1 = document.createElement("div");
    col1.className = "tour-col";
    col1.innerHTML = `<div class="tour-col-inner"></div>`;
    const col1Inner = col1.querySelector(".tour-col-inner");

    const col1Label = document.createElement("div");
    col1Label.className = `tour-label ${b.tour1LabelClass}`;
    col1Label.textContent = "🏁 TOUR 1 — POULES";
    col1Inner.appendChild(col1Label);

    b.groups.forEach((groupName, groupIndex) => {
      const card = document.createElement("div");
      card.className = `group-card ${b.tour1CardClass}`;
      card.innerHTML = `
        <div class="group-header ${b.groupHeaderClass}">
          <span class="group-name">Poule ${groupName}</span>
        </div>
        ${b.names.tour1[groupIndex].map((playerName, playerIndex) => `
          <div class="player-row">
            <span class="player-rank">${playerIndex + 1}</span>
            <span class="player-kart">${getIcon(tour1Icons, groupIndex * 4 + playerIndex)}</span>
            <span class="player-name">${playerName}</span>
            <span class="player-score">—</span>
          </div>
        `).join("")}
      `;
      col1Inner.appendChild(card);
    });

    const conn1 = document.createElement("div");
    conn1.className = "connector-col";
    conn1.innerHTML = buildConnectorSVG(b.connector1Color);

    const col2 = document.createElement("div");
    col2.className = "tour-col";
    col2.innerHTML = `<div class="tour-col-inner"></div>`;
    const col2Inner = col2.querySelector(".tour-col-inner");

    const col2Label = document.createElement("div");
    col2Label.className = `tour-label ${b.tour2LabelClass}`;
    col2Label.textContent = "🔀 TOUR 2 — QUALIFS CROISÉES";
    col2Inner.appendChild(col2Label);

    tour2.forEach((match, matchIndex) => {
      const card = document.createElement("div");
      card.className = `match-card ${b.tour2CardClass}`;
      card.innerHTML = `
        <div class="match-header ${b.tour2HeaderClass}">
          <span class="match-label">${match.label}</span>
          <span class="match-desc tour2-desc">${match.desc}</span>
        </div>
        ${match.slots.map((slot, slotIndex) => `
          <div class="match-slot">
            <span class="slot-origin">${slot.origin}</span>
            <span class="slot-kart">${getIcon(tour2Icons, matchIndex * 4 + slotIndex)}</span>
            <span class="slot-name">${slot.name}</span>
          </div>
        `).join("")}
      `;
      col2Inner.appendChild(card);
    });

    const conn2 = document.createElement("div");
    conn2.className = "connector-col";
    conn2.innerHTML = buildConnectorSVG(b.connector2Color);

    const col3 = document.createElement("div");
    col3.className = "tour-col";
    col3.innerHTML = `<div class="tour-col-inner"></div>`;
    const col3Inner = col3.querySelector(".tour-col-inner");

    const col3Label = document.createElement("div");
    col3Label.className = `tour-label ${b.tour3LabelClass}`;
    col3Label.textContent = "🏆 TOUR 3 — CLASSEMENT FINAL";
    col3Inner.appendChild(col3Label);

    tour3.forEach((match, matchIndex) => {
      const card = document.createElement("div");
      card.className = `match-card ${b.tour3CardClass}`;
      card.innerHTML = `
        <div class="match-header ${b.tour3HeaderClass}">
          <span class="match-label">${match.label}</span>
          <span class="match-desc tour3-desc">${match.places}</span>
        </div>
        ${match.slots.map((slot, slotIndex) => `
          <div class="match-slot">
            <span class="slot-origin">${slot.origin}</span>
            <span class="slot-kart">${getIcon(tour3Icons, matchIndex * 4 + slotIndex)}</span>
            <span class="slot-name">${slot.name}</span>
          </div>
        `).join("")}
      `;
      col3Inner.appendChild(card);
    });

    layout.appendChild(col1);
    layout.appendChild(conn1);
    layout.appendChild(col2);
    layout.appendChild(conn2);
    layout.appendChild(col3);

    section.appendChild(layout);
    container.appendChild(section);

    if (bi < brackets.length - 1) {
      const sep = document.createElement("div");
      sep.className = "section-sep";
      container.appendChild(sep);
    }
  });

  function buildConnectorSVG(color) {
    const cardHeight = 226;
    const gap = 16;
    const totalHeight = cardHeight * 4 + gap * 3;

    const centers = [0, 1, 2, 3].map(i => (cardHeight / 2) + i * (cardHeight + gap));

    return `
      <svg width="40" height="${totalHeight}" viewBox="0 0 40 ${totalHeight}" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;">
        ${centers.map(y => `
          <line x1="2" y1="${y}" x2="38" y2="${y}" stroke="${color}" stroke-width="1.6" stroke-opacity="0.46" stroke-dasharray="4 4"/>
          <circle cx="2" cy="${y}" r="2.6" fill="${color}" fill-opacity="0.62"/>
          <circle cx="38" cy="${y}" r="2.6" fill="${color}" fill-opacity="0.62"/>
        `).join("")}
        <line x1="20" y1="18" x2="20" y2="${totalHeight - 18}" stroke="${color}" stroke-width="1" stroke-opacity="0.14"/>
      </svg>
    `;
  }
</script>
</body>
</html>
