<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableaux de Résultats — Mario Kart</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #E8001D;
      --blue: #0052A5;
      --yellow: #FFD700;
      --dark: #07071a;
      --red-glow: rgba(232, 0, 29, 0.5);
      --blue-glow: rgba(0, 82, 165, 0.5);
      --yellow-glow: rgba(255, 215, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      font-family: 'Exo 2', sans-serif;
      color: #fff;
      min-height: 100vh;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(0,82,165,0.2), transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(232,0,29,0.12), transparent 60%),
        linear-gradient(180deg, #060610 0%, #0A0A1E 100%);
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent 0, transparent 79px, rgba(255,255,255,0.018) 79px, rgba(255,255,255,0.018) 80px),
        repeating-linear-gradient(180deg, transparent 0, transparent 79px, rgba(255,255,255,0.018) 79px, rgba(255,255,255,0.018) 80px);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      min-height: 64px;
      padding: 0 28px;
      background: rgba(7, 7, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(232, 0, 29, 0.3);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    .brand-wrap {
      justify-self: start;
    }

    .top-title-wrap {
      justify-self: center;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .back-wrap {
      justify-self: end;
    }

    .brand {
      font-family: 'Russo One', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      color: var(--yellow);
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
      text-decoration: none;
      white-space: nowrap;
    }

    .brand span {
      color: rgba(255,255,255,0.5);
    }

    .top-title {
      text-align: center;
      font-family: 'Russo One', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      width: 100%;
    }

    .back-btn {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.1em;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--red);
    }

    .page {
      position: relative;
      z-index: 1;
      padding: 40px 20px 80px;
    }

    .bracket-section {
      max-width: 1400px;
      margin: 0 auto 72px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .section-number {
      font-family: 'Russo One', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
    }

    .num-blue   { color: var(--blue);   text-shadow: 0 0 24px var(--blue-glow); }
    .num-red    { color: var(--red);    text-shadow: 0 0 24px var(--red-glow); }
    .num-yellow { color: var(--yellow); text-shadow: 0 0 24px var(--yellow-glow); }

    .section-info h2 {
      font-family: 'Russo One', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.06em;
    }

    .section-info p {
      font-size: 0.83rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .section-badge {
      margin-left: auto;
      padding: 10px 26px;
      min-width: 210px;
      text-align: center;
      border-radius: 24px;
      font-family: 'Russo One', sans-serif;
      font-size: 0.86rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .badge-blue   { background: rgba(0,82,165,0.3);   border: 1px solid var(--blue);   color: #6eb4ff; }
    .badge-red    { background: rgba(232,0,29,0.3);   border: 1px solid var(--red);    color: #ff8090; }
    .badge-yellow { background: rgba(255,215,0,0.18); border: 1px solid var(--yellow); color: var(--yellow); }

    .legend {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.5);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .bracket-layout {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 52px minmax(260px, 1fr) 52px minmax(260px, 1fr);
      gap: 0;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .tour-col {
      min-width: 260px;
    }

    .tour-label {
      font-family: 'Russo One', sans-serif;
      font-size: 0.98rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-align: center;
      padding: 11px 14px;
      border-radius: 7px 7px 0 0;
      margin-bottom: 14px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lbl-blue   { background: rgba(0,82,165,0.3);   color: #6eb4ff;      border: 1px solid rgba(0,82,165,0.55); }
    .lbl-red    { background: rgba(232,0,29,0.28);  color: #ff8090;      border: 1px solid rgba(232,0,29,0.55); }
    .lbl-yellow { background: rgba(255,215,0,0.18); color: var(--yellow); border: 1px solid rgba(255,215,0,0.45); }

    .group-card,
    .match-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .group-card:hover,
    .match-card:hover {
      border-color: rgba(255,255,255,0.18);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
    }

    .hdr-blue   { background: rgba(0,82,165,0.28);  border-bottom: 1px solid rgba(0,82,165,0.35); }
    .hdr-red    { background: rgba(232,0,29,0.22);  border-bottom: 1px solid rgba(232,0,29,0.35); }
    .hdr-yellow { background: rgba(255,215,0,0.14); border-bottom: 1px solid rgba(255,215,0,0.35); }

    .card-title {
      font-family: 'Russo One', sans-serif;
      font-size: 0.97rem;
      letter-spacing: 0.1em;
    }

    .card-tag {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.50);
      letter-spacing: 0.05em;
      margin-left: auto;
      text-align: right;
      white-space: nowrap;
    }

    .tour3-tag {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.82);
      text-align: right;
      margin-left: auto;
      white-space: nowrap;
      font-family: 'Russo One', sans-serif;
      letter-spacing: 0.06em;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      min-height: 46px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .card-row:last-child {
      border-bottom: none;
    }

    .card-row:hover {
      background: rgba(255,255,255,0.045);
    }

    .row-rank {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.22);
      font-weight: 700;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .row-emoji {
      font-size: 1.05rem;
      flex-shrink: 0;
    }

    .row-origin {
      font-size: 0.64rem;
      color: rgba(255,255,255,0.28);
      width: 90px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .row-name {
      font-size: 0.93rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.85);
      flex: 1;
    }

    .row-score {
      font-family: 'Russo One', sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      min-width: 24px;
      text-align: right;
    }

    .connector-col {
      width: 52px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 8px;
    }

    .single-connector {
      display: block;
      margin-top: 8px;
    }

    .section-sep {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      margin: 0 0 72px;
    }

    @media (max-width: 900px) {
      .top-bar {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 14px 18px;
      }

      .brand-wrap,
      .top-title-wrap,
      .back-wrap {
        justify-self: center;
      }

      .top-title {
        font-size: 1.05rem;
      }

      .bracket-layout {
        grid-template-columns: 1fr;
      }

      .connector-col {
        display: none;
      }

      .section-badge {
        min-width: auto;
        padding: 10px 18px;
      }

      .section-header {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

            <span class="card-tag">${match.matchTag}</span>
          </div>
          ${match.slots.map((slot, i) => `
            <div class="card-row">
              <span class="row-origin">${slot}</span>
              <span class="row-emoji">${rng(KART_EMOJI)}</span>
              <span class="row-name">${match.players[i]}</span>
            </div>
          `).join("")}
        `;
        col2.appendChild(card);
      });

      const conn2 = document.createElement("div");
      conn2.className = "connector-col";
      conn2.innerHTML = makeSingleConnector(cs[1]);

      const col3 = document.createElement("div");
      col3.className = "tour-col";
      col3.innerHTML = `<div class="tour-label lbl-${cs[2]}">🏆 Tour 3 — Classement final</div>`;

      bracket.tour3Matches.forEach(match => {
        const card = document.createElement("div");
        card.className = "match-card";
        card.innerHTML = `
          <div class="card-header hdr-${cs[2]}">
            <span class="card-title">${match.matchName}</span>
            <span class="tour3-tag">${match.matchTag}</span>
          </div>
          ${match.slots.map((slot, i) => `
            <div class="card-row">
              <span class="row-origin">${slot}</span>
              <span class="row-emoji">${rng(TOUR3_EMOJI)}</span>
              <span class="row-name">${match.players[i]}</span>
            </div>
          `).join("")}
        `;
        col3.appendChild(card);
      });

      layout.appendChild(col1);
      layout.appendChild(conn1);
      layout.appendChild(col2);
      layout.appendChild(conn2);
      layout.appendChild(col3);

      section.appendChild(layout);
      container.appendChild(section);

      if (bi < BRACKETS.length - 1) {
        const sep = document.createElement("div");
        sep.className = "section-sep";
        container.appendChild(sep);
      }
    });

    function makeSingleConnector(colorName) {
      const map = {
        blue: "#0052A5",
        red: "#E8001D",
        yellow: "#FFD700"
      };

      const c = map[colorName] || "#ffffff";

      return `
        <svg class="single-connector" width="52" height="50" viewBox="0 0 52 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="6" y1="25" x2="46" y2="25"
                stroke="${c}" stroke-width="2"
                stroke-opacity="0.65" stroke-dasharray="5 4"/>
          <circle cx="6" cy="25" r="3.5" fill="${c}" fill-opacity="0.8"/>
          <circle cx="46" cy="25" r="3.5" fill="${c}" fill-opacity="0.8"/>
        </svg>
      `;
    }
  </script>
</body>
</html>
